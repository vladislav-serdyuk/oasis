---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
# image will be published to ghcr.io/<user>/<name>
name: oasis
# description will be included in the image's metadata
description: A simple, fast, and reliable alternative to Windows. It works with your hardware and runs your favorite apps right out of the box.

# the base image to build on top of (FROM) and the version tag to use
base-image: ghcr.io/ublue-os/aurora-nvidia-open
image-version: 43 # latest is also supported if you want new updates ASAP

# module configuration, executed in order
# you can include multiple instances of the same module
modules:
  - type: files
    files:
      - source: system
        destination: / # copies files/system/* (* means everything inside it) into your image's root folder /

  - type: rpm-ostree
    install:
      # Printing and Hardware
      - cups
      - hplip
      - system-config-printer
      - sane-backends
      # Filesystems
      - ntfs-3g
      - exfatprogs
      # Codecs
      - ffmpeg
      # Fonts
      - google-arimo-fonts
      - google-tinos-fonts
      - google-cousine-fonts
      - liberation-fonts

  - type: default-flatpaks
    configurations:
      - notify: true
        scope: system
        install:
          - com.google.Chrome
          - org.mozilla.firefox
          - org.libreoffice.LibreOffice
          - org.videolan.VLC
          - com.usebottles.bottles
          - org.kde.kcalc
          - org.kde.gwenview
          - org.kde.kolourpaint
          - com.github.tchx84.Flatseal

  - type: script
    snippets:
      # Fixes KDE Plasma Setup bug: ensures US layout fallback and Alt+Shift toggle
      # for non-latin layouts, preventing lock-out during user creation.
      - |
        echo "Applying layout fix to KDE Plasma Setup..."
        FILE="/usr/share/plasma/packages/org.kde.plasmasetup.keyboard/contents/ui/main.qml"
        if [ -f "$FILE" ]; then
          sed -i 's/KeyboardUtil.layoutName = shortName;/KeyboardUtil.layoutName = (shortName === "us" ? "us" : "us," + shortName); KeyboardUtil.layoutOptions = ["grp:alt_shift_toggle"];/g' "$FILE"
          sed -i 's/KeyboardUtil.layoutVariant = variantName;/KeyboardUtil.layoutVariant = (shortName === "us" ? variantName : "," + variantName);/g' "$FILE"
          echo "KDE Plasma Setup patched successfully."
        else
          echo "Warning: Target file not found, skipping patch."
        fi

  - type: signing # this sets up the proper policy & signing files for signed images to work fully
